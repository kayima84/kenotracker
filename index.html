<!DOCTYPE html>
<html>
<head>
  <title>60 Checkboxes Rounds</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      max-width: 400px;
      margin-bottom: 20px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
      margin-bottom: 15px;
      margin-right: 10px;
    }

    #result {
      margin-top: 10px;
      line-height: 1.6;
      font-weight: bold;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <h3>Select Numbers (1–60)</h3>

  <div class="grid" id="checkboxContainer"></div>

  <button onclick="submitSelection()">Submit</button>
  <button onclick="copyData()">Copy</button>

  <div id="result"></div>

  <script>
    const container = document.getElementById("checkboxContainer");

    // Create 60 checkboxes
    for (let i = 1; i <= 60; i++) {
      const div = document.createElement("div");
      div.className = "item";

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.id = "num" + i;
      checkbox.value = i;

      const label = document.createElement("label");
      label.htmlFor = "num" + i;
      label.innerText = i;

      div.appendChild(checkbox);
      div.appendChild(label);

      container.appendChild(div);
    }

    // Round counter
    let round = 1;

    function submitSelection() {
      const selected = [];

      for (let i = 1; i <= 60; i++) {
        const box = document.getElementById("num" + i);
        if (box.checked) {
          selected.push(box.value);
        }
      }

      const resultDiv = document.getElementById("result");

      const text = "Round " + round + ": " +
        (selected.length ? selected.join(", ") : "None");

      resultDiv.innerHTML += text + "\n";

      round++;

      // Clear checkboxes
      for (let i = 1; i <= 60; i++) {
        document.getElementById("num" + i).checked = false;
      }
    }

    // COPY FUNCTION WITH MESSAGE HEADER
    function copyData() {
      const text = document.getElementById("result").innerText;

      const message = "These are rounds with numbers taken from a keno game can you predict 4 numbers in the next round?\n\n";

      navigator.clipboard.writeText(message + text).then(() => {
        alert("Copied successfully!");
      });
    }
  </script>

</body>
</html>
